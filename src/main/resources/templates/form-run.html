<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Run</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a2e;
            background-image: radial-gradient(ellipse at 20% 20%, #16213e 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, #0f3460 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            margin: 0; color: #fff;
        }

        .page-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border-bottom: 3px solid #ffd60a;
            padding: 1.25rem 1rem; text-align: center;
            position: sticky; top: 0; z-index: 10;
        }
        .page-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.55rem, 3vw, 0.85rem);
            color: #f0c040;
            text-shadow: 2px 2px 0 #b8860b, 3px 3px 0 #8b6914;
            margin: 0; line-height: 1.7;
        }

        .form-wrap { max-width: 560px; margin: 0 auto; padding: 1.25rem 0.9rem 5.5rem; }

        .form-label {
            color: rgba(255,255,255,0.65); font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 0.35rem; display: block;
        }
        .form-control, .form-select {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 10px; width: 100%;
            padding: 0.75rem 0.9rem;
            font-family: 'Nunito', sans-serif; font-size: 1.05rem;
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            outline: none; border-color: #f0c040;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(240,192,64,0.15);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .form-select option { background: #16213e; color: #fff; }

        .player-fieldset {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 14px; padding: 1rem !important; margin-bottom: 1rem;
        }
        .player-fieldset legend {
            color: #f0c040; font-weight: 800; font-size: 0.85rem;
            letter-spacing: 1px; text-transform: uppercase;
            background: #1a1a2e; padding: 2px 10px; border-radius: 20px;
        }

        .section-divider {
            display: flex; align-items: center; gap: 12px; margin: 1.25rem 0;
        }
        .section-divider::before, .section-divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
        }
        .section-divider span {
            color: rgba(255,255,255,0.3); font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
        }

        /* ── PICKER VISUAL ── */
        .picker-wrapper { position: relative; margin-bottom: 0.75rem; }
        .picker-search-wrap { position: relative; }
        .picker-search-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35); pointer-events: none; font-size: 1rem;
        }
        .picker-search-input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px 10px 0 0; color: #fff;
            padding: 0.8rem 0.9rem 0.8rem 2.6rem;
            width: 100%; font-family: 'Nunito', sans-serif; font-size: 1.05rem;
            outline: none; transition: border-color 0.2s;
        }
        .picker-search-input:focus { border-color: #f0c040; }
        .picker-search-input::placeholder { color: rgba(255,255,255,0.25); }

        .picker-selected-display {
            display: flex; align-items: center; gap: 12px;
            background: rgba(240,192,64,0.1);
            border: 1px solid rgba(240,192,64,0.35);
            border-top: none; border-radius: 0 0 10px 10px;
            padding: 0.65rem 1rem; min-height: 60px; cursor: pointer;
        }
        .picker-selected-display img {
            height: 48px; width: auto; max-width: 80px;
            object-fit: cover; border-radius: 5px; flex-shrink: 0;
        }
        .picker-selected-display .selected-name { color: #f0c040; font-weight: 700; font-size: 1.05rem; }
        .picker-selected-display .placeholder-text { color: rgba(255,255,255,0.25); font-size: 0.95rem; }
        .picker-selected-display .clear-btn {
            margin-left: auto;
            background: rgba(230,57,70,0.3); border: none; color: #e63946;
            border-radius: 50%; width: 30px; height: 30px; font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .picker-dropdown {
            display: none; position: absolute; left: 0; right: 0; z-index: 1000;
            background: #16213e; border: 1px solid rgba(255,255,255,0.15);
            border-top: none; border-radius: 0 0 14px 14px;
            max-height: 300px; overflow-y: auto; padding: 10px;
            scrollbar-width: thin; scrollbar-color: #f0c040 transparent;
        }
        /* Grid pokémon */
        .picker-dropdown.open {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 7px;
        }
        /* Grid jogos — cards maiores com capa */
        .picker-dropdown.jogo-dropdown.open {
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        }

        .picker-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 8px 4px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; background: rgba(255,255,255,0.04);
            transition: all 0.12s; text-align: center;
            min-height: 85px; justify-content: center;
        }
        .picker-card:hover, .picker-card:active { background: rgba(240,192,64,0.15); border-color: rgba(240,192,64,0.5); }
        .picker-card.selected { background: rgba(240,192,64,0.2); border-color: #f0c040; }
        .picker-card.hidden { display: none; }

        /* Sprite pokémon */
        .picker-card img.pkm-img {
            width: 56px; height: 56px; image-rendering: pixelated; object-fit: contain;
        }
        /* Capa jogo */
        .jogo-dropdown .picker-card { min-height: 110px; padding: 6px; }
        .picker-card img.game-img {
            width: 120px; height: 80px;
            object-fit: cover; border-radius: 6px;
            image-rendering: auto;
        }

        .picker-card span {
            font-size: 0.65rem; color: rgba(255,255,255,0.7);
            margin-top: 4px; line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            max-width: 120px;
        }
        .picker-card.selected span { color: #f0c040; }
        .picker-real-select { display: none !important; }
        .no-results {
            display: none; color: rgba(255,255,255,0.35);
            font-size: 0.9rem; text-align: center; padding: 20px; grid-column: 1 / -1;
        }

        /* Resultado sorteio */
        .resultado-box {
            background: rgba(240,192,64,0.08);
            border: 1px solid rgba(240,192,64,0.25);
            border-radius: 12px; padding: 1rem; text-align: center; margin-top: 0.75rem;
        }
        .result-label {
            color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem;
        }
        .result-name {
            color: #f0c040; font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem; text-shadow: 1px 1px 0 #b8860b;
        }
        .result-error { color: #e63946; font-size: 0.9rem; font-weight: 700; }

        .btn-sortear {
            background: linear-gradient(135deg, #2dc653, #1a8c3a);
            border: none; color: #fff; font-weight: 800;
            border-radius: 10px; padding: 0.65rem 1.75rem;
            font-family: 'Nunito', sans-serif; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(45,198,83,0.3); cursor: pointer; transition: all 0.2s;
        }
        .btn-sortear:hover { transform: translateY(-2px); }

        /* ── BOTÕES FIXOS ── */
        .form-actions {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.96); backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 0.9rem 1rem; display: flex; gap: 0.6rem; z-index: 20;
        }
        .btn-cancelar {
            flex: 1; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
            border-radius: 12px; padding: 0.8rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; font-size: 1rem;
            text-align: center; text-decoration: none; transition: background 0.15s;
        }
        .btn-cancelar:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .btn-salvar {
            flex: 2; background: linear-gradient(135deg, #e63946, #c1121f);
            border: none; color: #fff; font-weight: 800;
            border-radius: 12px; padding: 0.8rem;
            font-family: 'Nunito', sans-serif; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4); cursor: pointer;
        }
        .btn-salvar:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="page-header">
    <h1 class="page-title" th:text="${run.id == null} ? 'Nova Run' : 'Editar Run'">Nova Run</h1>
</div>

<div class="form-wrap">
    <form th:action="${run.id == null} ? @{/runs} : @{/runs/{id}/editar(id=${run.id})}"
          th:object="${run}" method="post" id="main-form">

        <input type="hidden" th:field="*{id}" />

        <!-- ── Picker de Jogo ── -->
        <div class="mb-3">
            <label class="form-label">🎮 Jogo</label>
            <select class="picker-real-select" id="jogo-select" th:field="*{jogo}" required>
                <option value="">Escolha um jogo...</option>
                <option th:each="j : ${jogos}"
                        th:value="${j.id}"
                        th:text="${j.nome}"
                        th:attr="data-sprite=${j.sprite}"></option>
            </select>
            <div class="picker-wrapper" data-target="jogo-select" data-type="jogo">
                <div class="picker-search-wrap">
                    <span class="picker-search-icon">🔍</span>
                    <input type="text" class="picker-search-input" placeholder="Buscar jogo..." autocomplete="off">
                </div>
                <div class="picker-selected-display"><span class="placeholder-text">Nenhum jogo selecionado</span></div>
                <div class="picker-dropdown jogo-dropdown"><span class="no-results">Nenhum jogo encontrado</span></div>
            </div>
        </div>

        <!-- Nome da Run -->
        <div class="mb-3">
            <label class="form-label">📛 Nome da Run</label>
            <input type="text" class="form-control" th:field="*{nomeDaRun}"
                   placeholder="oq tu quiser" required>
        </div>

        <!-- Nicknames -->
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="form-label">🧑 Seu Nickname</label>
                <input type="text" class="form-control" th:field="*{jogador1}" required>
            </div>
            <div class="col-6">
                <label class="form-label">🧑 Parceiro</label>
                <input type="text" class="form-control" th:field="*{jogador2}" required>
            </div>
        </div>

        <div class="section-divider"><span>⚔️ Sorteio dos Iniciais</span></div>

        <!-- Jogador 1 -->
        <fieldset class="player-fieldset border">
            <legend class="float-none w-auto px-2">🎮 Jogador 1 — Inicial</legend>
            <div class="row g-2 mb-3">
                <div class="col-4">
                    <label class="form-label">Opção 1</label>
                    <select class="form-select starter-p1-option" id="starter-p1-opt1">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-4">
                    <label class="form-label">Opção 2</label>
                    <select class="form-select starter-p1-option" id="starter-p1-opt2">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-4">
                    <label class="form-label">Opção 3</label>
                    <select class="form-select starter-p1-option" id="starter-p1-opt3">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
            </div>
            <div class="text-center">
                <button type="button" class="btn-sortear" id="sortear-p1-btn">Sortear</button>
            </div>
            <div id="resultado-p1"></div>
        </fieldset>

        <input type="hidden" id="starter-p1-choice" name="starterP1Id" />

        <!-- Jogador 2 -->
        <fieldset class="player-fieldset border">
            <legend class="float-none w-auto px-2">🎮 Jogador 2 — Inicial</legend>
            <div class="row g-2 mb-3">
                <div class="col-4">
                    <label class="form-label">Opção 1</label>
                    <select class="form-select starter-p2-option" id="starter-p2-opt1">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-4">
                    <label class="form-label">Opção 2</label>
                    <select class="form-select starter-p2-option" id="starter-p2-opt2">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-4">
                    <label class="form-label">Opção 3</label>
                    <select class="form-select starter-p2-option" id="starter-p2-opt3">
                        <option value="">—</option>
                        <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
            </div>
            <div class="text-center">
                <button type="button" class="btn-sortear" id="sortear-p2-btn">Sortear</button>
            </div>
            <div id="resultado-p2"></div>
        </fieldset>

        <input type="hidden" id="starter-p2-choice" name="starterP2Id" />

    </form>
</div>

<div class="form-actions">
    <a href="/" class="btn-cancelar">Cancelar</a>
    <button type="submit" form="main-form" class="btn-salvar" id="save-run-btn" disabled>Salvar e Começar!</button>
</div>

<script th:inline="javascript">
    // ── Picker visual de jogos ──
    document.querySelectorAll('.picker-wrapper').forEach(wrapper => {
        const targetId        = wrapper.dataset.target;
        const isJogo          = wrapper.dataset.type === 'jogo';
        const realSelect      = document.getElementById(targetId);
        const searchInput     = wrapper.querySelector('.picker-search-input');
        const dropdown        = wrapper.querySelector('.picker-dropdown');
        const selectedDisplay = wrapper.querySelector('.picker-selected-display');
        const noResults       = wrapper.querySelector('.no-results');

        [...realSelect.options].filter(o => o.value).forEach(opt => {
            const card = document.createElement('div');
            card.className = 'picker-card';
            card.dataset.id   = opt.value;
            card.dataset.name = opt.text.toLowerCase();
            const sprite = opt.dataset.sprite || '';
            const imgClass = isJogo ? 'game-img' : 'pkm-img';
            const imgTag = sprite
                ? `<img src="${sprite}" alt="${opt.text}" class="${imgClass}" onerror="this.style.display='none'">`
                : '';
            card.innerHTML = `${imgTag}<span>${opt.text}</span>`;
            card.addEventListener('click', () => selectItem(wrapper, realSelect, card, opt.value, opt.text, sprite, isJogo));
            dropdown.appendChild(card);
        });

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase().trim();
            let visible = 0;
            dropdown.querySelectorAll('.picker-card').forEach(c => {
                const match = c.dataset.name.includes(q);
                c.classList.toggle('hidden', !match);
                if (match) visible++;
            });
            noResults.style.display = visible === 0 ? 'block' : 'none';
        });

        searchInput.addEventListener('focus', () => dropdown.classList.add('open'));
        document.addEventListener('click', e => {
            if (!wrapper.contains(e.target)) dropdown.classList.remove('open');
        });
        selectedDisplay.addEventListener('click', () => {
            dropdown.classList.toggle('open');
            if (dropdown.classList.contains('open')) searchInput.focus();
        });

        const currentVal = realSelect.value;
        if (currentVal) {
            const opt = realSelect.options[realSelect.selectedIndex];
            setDisplay(selectedDisplay, opt.text, opt.dataset.sprite || '', isJogo);
            dropdown.querySelectorAll('.picker-card').forEach(c =>
                c.classList.toggle('selected', c.dataset.id === currentVal));
        }
    });

    function selectItem(wrapper, realSelect, card, id, name, sprite, isJogo) {
        realSelect.value = id;
        realSelect.dispatchEvent(new Event('change'));
        setDisplay(wrapper.querySelector('.picker-selected-display'), name, sprite, isJogo);
        wrapper.querySelectorAll('.picker-card').forEach(c => c.classList.toggle('selected', c === card));
        wrapper.querySelector('.picker-dropdown').classList.remove('open');
        wrapper.querySelector('.picker-search-input').value = '';
        wrapper.querySelectorAll('.picker-card').forEach(c => c.classList.remove('hidden'));
    }

    function setDisplay(display, name, sprite, isJogo) {
        const imgClass = isJogo ? 'game-img' : 'pkm-img';
        const imgTag = sprite
            ? `<img src="${sprite}" alt="${name}" class="${imgClass}" onerror="this.style.display='none'">`
            : '';
        display.innerHTML = `
            ${imgTag}
            <span class="selected-name">${name}</span>
            <button type="button" class="clear-btn" title="Limpar">✕</button>`;
        display.querySelector('.clear-btn').addEventListener('click', e => {
            e.stopPropagation();
            const wrapper    = display.closest('.picker-wrapper');
            const realSelect = document.getElementById(wrapper.dataset.target);
            realSelect.value = '';
            realSelect.dispatchEvent(new Event('change'));
            display.innerHTML = '<span class="placeholder-text">Nenhum selecionado</span>';
            wrapper.querySelectorAll('.picker-card').forEach(c => c.classList.remove('selected'));
        });
    }

    // ── Sorteio ──
    const escolhaInputP1 = document.getElementById('starter-p1-choice');
    const escolhaInputP2 = document.getElementById('starter-p2-choice');
    const saveRunBtn     = document.getElementById('save-run-btn');

    function checkIfReadyToSave() {
        saveRunBtn.disabled = !(escolhaInputP1.value && escolhaInputP2.value);
    }

    function showResultado(divId, name) {
        document.getElementById(divId).innerHTML = `
            <div class="resultado-box">
                <div class="result-label">Pokémon sorteado</div>
                <div class="result-name">${name}</div>
            </div>`;
    }

    function showError(divId, msg) {
        document.getElementById(divId).innerHTML =
            `<div class="resultado-box"><div class="result-error">${msg}</div></div>`;
    }

    function sortear(selectorClass, resultDivId, hiddenInput) {
        const opts = [];
        document.querySelectorAll('.' + selectorClass).forEach(sel => {
            if (sel.value) opts.push({ id: sel.value, name: sel.options[sel.selectedIndex].text });
        });
        if (!opts.length) { showError(resultDivId, 'Selecione pelo menos uma opção!'); return; }
        const sorteado = opts[Math.floor(Math.random() * opts.length)];
        hiddenInput.value = sorteado.id;
        showResultado(resultDivId, sorteado.name);
        checkIfReadyToSave();
    }

    document.getElementById('sortear-p1-btn').addEventListener('click', () =>
        sortear('starter-p1-option', 'resultado-p1', escolhaInputP1));
    document.getElementById('sortear-p2-btn').addEventListener('click', () =>
        sortear('starter-p2-option', 'resultado-p2', escolhaInputP2));
</script>
</body>
</html>
