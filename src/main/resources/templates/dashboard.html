<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Nuzlocke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background: #1a1a2e;
            background-image: radial-gradient(ellipse at 20% 20%, #16213e 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, #0f3460 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            color: #fff;
            margin: 0;
        }

        /* ── HEADER ── */
        .site-header {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 1.25rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .site-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.55rem, 3vw, 0.9rem);
            color: #f0c040;
            text-shadow: 2px 2px 0 #b8860b, 4px 4px 0 #8b6914;
            line-height: 1.9;
            margin: 0;
        }
        .site-sub {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.1rem;
        }
        .btn-nova-run {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none;
            color: #fff;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            border-radius: 12px;
            padding: 0.6rem 1.25rem;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4);
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-nova-run:hover { transform: translateY(-2px); color: #fff; }

        /* ── CONTENT ── */
        .content-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.25rem 0.85rem 4rem;
        }

        .section-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        /* ── RUN CARD ── */
        .run-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .run-card:active {
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-color: rgba(240,192,64,0.25);
        }

        /* capa */
        .game-cover {
            position: relative;
            height: 140px;
            overflow: hidden;
            background: linear-gradient(135deg, #0f3460, #16213e);
        }
        .game-cover img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(26,26,46,0.95) 100%);
        }
        .game-badge {
            position: absolute;
            bottom: 10px; left: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* corpo */
        .run-body {
            padding: 0.9rem 1rem 0.75rem;
        }
        .run-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: #fff;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }
        .run-players {
            color: #f0c040;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .run-players .sep { color: rgba(255,255,255,0.3); font-weight: 400; }

        /* rodapé */
        .run-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        /* Ver Detalhes ocupa o espaço todo à esquerda */
        .btn-detalhes {
            flex: 1;
            text-align: center;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            border-radius: 10px;
            padding: 0.55rem 0;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-detalhes:hover { background: rgba(255,255,255,0.13); color: #fff; }

        .btn-editar {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.35);
            color: #60a5fa;
            border-radius: 10px;
            padding: 0.55rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .btn-editar:hover { background: rgba(59,130,246,0.3); color: #93c5fd; }

        .btn-deletar {
            background: rgba(230,57,70,0.12);
            border: 1px solid rgba(230,57,70,0.28);
            color: #e63946;
            border-radius: 10px;
            padding: 0.55rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .btn-deletar:hover { background: rgba(230,57,70,0.25); }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
        }
        .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
        .empty-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.35);
            line-height: 2;
            margin-bottom: 0.75rem;
        }
        .empty-sub { color: rgba(255,255,255,0.25); font-size: 0.85rem; }

        /* desktop: 2 colunas a partir de 600px */
        @media (min-width: 600px) {
            .runs-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }
            .run-card { margin-bottom: 0; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div>
        <h1 class="site-title">Minhas Runs<br>de Soulink</h1>
        <p class="site-sub">Acompanhe suas aventuras e pares.</p>
    </div>
    <a href="/runs/novo" class="btn-nova-run">+ Nova Run</a>
</header>

<div class="content-wrap">

    <p class="section-label">⚔️ Suas runs</p>

    <div class="runs-grid" th:if="${!runs.isEmpty()}">
        <div th:each="run : ${runs}" class="run-card">

            <div class="game-cover">
                <img th:src="${run.jogo.sprite}" th:alt="${run.jogo.nome}"
                     onerror="this.style.display='none'">
                <div class="cover-overlay"></div>
                <span class="game-badge" th:text="${run.jogo.nome}">Jogo</span>
            </div>

            <div class="run-body">
                <div class="run-name" th:text="${run.nomeDaRun}">Nome</div>
                <div class="run-players">
                    👥 <th:block th:text="${run.jogador1}"/>
                    <span class="sep"> &amp; </span>
                    <th:block th:text="${run.jogador2}"/>
                </div>
            </div>

            <div class="run-footer">
                <a th:href="@{/runs/{id}(id=${run.id})}" class="btn-detalhes">Ver Detalhes</a>
                <a th:href="@{/runs/{id}/editar(id=${run.id})}" class="btn-editar">✏️</a>
                <form th:action="@{/runs/{id}/deletar(id=${run.id})}" method="post" class="d-inline">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="btn-deletar"
                            onclick="return confirm('Deletar esta run?');">🗑</button>
                </form>
            </div>

        </div>
    </div>

    <div th:if="${runs.isEmpty()}" class="empty-state">
        <span class="empty-icon">🎮</span>
        <h3 class="empty-title">Nenhuma run ainda</h3>
        <p class="empty-sub">Crie sua primeira aventura!</p>
    </div>

</div>

</body>
</html>
