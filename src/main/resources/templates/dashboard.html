<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador Nuzlocke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a1a2e;
            background-image: radial-gradient(ellipse at 20% 20%, #16213e 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, #0f3460 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            color: #fff;
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 3.5rem 1rem 2.5rem;
        }

        .hero-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.75rem, 2.5vw, 1.1rem);
            color: #f0c040;
            text-shadow: 3px 3px 0 #b8860b, 6px 6px 0 #8b6914;
            line-height: 1.8;
            margin-bottom: 0.75rem;
        }

        .hero-sub {
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .btn-nova-run {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none;
            color: #fff;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            border-radius: 14px;
            padding: 0.75rem 2.5rem;
            box-shadow: 0 4px 20px rgba(230,57,70,0.45);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-nova-run:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(230,57,70,0.6);
            color: #fff;
        }

        /* ── GRID ── */
        .runs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
            padding: 0 1rem 4rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── RUN CARD ── */
        .run-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .run-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            border-color: rgba(240,192,64,0.3);
        }

        /* Capa do jogo */
        .game-cover {
            position: relative;
            height: 130px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .game-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }
        .game-cover .cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(26,26,46,0.95) 100%);
        }
        .game-cover .game-badge {
            position: absolute;
            bottom: 8px;
            left: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Corpo */
        .run-body {
            padding: 1rem 1.1rem 0.5rem;
            flex: 1;
        }
        .run-name {
            font-weight: 800;
            font-size: 1.05rem;
            color: #fff;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }
        .run-players {
            color: #f0c040;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .run-players span {
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* Footer */
        .run-footer {
            padding: 0.75rem 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.07);
            gap: 0.5rem;
        }

        .btn-detalhes {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            border-radius: 9px;
            padding: 0.35rem 0.9rem;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-detalhes:hover {
            background: rgba(255,255,255,0.13);
            color: #fff;
        }

        .btn-editar {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.35);
            color: #60a5fa;
            border-radius: 9px;
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-editar:hover {
            background: rgba(59,130,246,0.3);
            color: #93c5fd;
        }

        .btn-deletar {
            background: rgba(230,57,70,0.12);
            border: 1px solid rgba(230,57,70,0.3);
            color: #e63946;
            border-radius: 9px;
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-deletar:hover {
            background: rgba(230,57,70,0.25);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 420px;
            margin: 0 auto;
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .empty-state h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.8;
            margin-bottom: 0.75rem;
        }
        .empty-state p {
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<main>

    <!-- Hero -->
    <div class="hero">
        <h1 class="hero-title">Minhas Runs<br>de Soulink</h1>
        <p class="hero-sub">Acompanhe suas aventuras e seus pares.</p>
        <a href="/runs/novo" class="btn-nova-run">+ Criar Nova Run</a>
    </div>

    <!-- Grid de runs -->
    <div class="runs-grid" th:if="${!runs.isEmpty()}">
        <div th:each="run : ${runs}" class="run-card">

            <!-- Capa do jogo -->
            <div class="game-cover">
                <!-- Mapeamento de capa por ID do jogo -->
                <img th:src="${
                    run.jogo.id == 1 ? 'https://archives.bulbagarden.net/media/upload/thumb/a/a4/Pok%C3%A9mon_Black_and_White_2_boxart.png/250px-Pok%C3%A9mon_Black_and_White_2_boxart.png' :
                    run.jogo.id == 2 ? 'https://archives.bulbagarden.net/media/upload/thumb/8/8f/Pok%C3%A9mon_Platinum_boxart.png/250px-Pok%C3%A9mon_Platinum_boxart.png' :
                    run.jogo.id == 3 ? 'https://archives.bulbagarden.net/media/upload/thumb/4/4f/HeartGoldSoulSilverDualBoxart.png/250px-HeartGoldSoulSilverDualBoxart.png' :
                    run.jogo.id == 4 ? 'https://archives.bulbagarden.net/media/upload/thumb/7/76/Pok%C3%A9mon_Omega_Ruby_and_Alpha_Sapphire_boxart.png/250px-Pok%C3%A9mon_Omega_Ruby_and_Alpha_Sapphire_boxart.png' :
                    run.jogo.id == 5 ? 'https://archives.bulbagarden.net/media/upload/thumb/4/4a/Pok%C3%A9mon_X_and_Y_boxart.png/250px-Pok%C3%A9mon_X_and_Y_boxart.png' :
                    run.jogo.id == 6 ? 'https://archives.bulbagarden.net/media/upload/thumb/5/53/Pok%C3%A9mon_Pearl_and_Diamond_boxart.png/250px-Pok%C3%A9mon_Pearl_and_Diamond_boxart.png' :
                    run.jogo.id == 7 ? 'https://archives.bulbagarden.net/media/upload/thumb/1/1b/Pok%C3%A9mon_Sun_and_Moon_boxart.png/250px-Pok%C3%A9mon_Sun_and_Moon_boxart.png' :
                    run.jogo.id == 8 ? 'https://archives.bulbagarden.net/media/upload/thumb/8/81/FireRedLeafGreenDualBoxart.png/250px-FireRedLeafGreenDualBoxart.png' :
                    run.jogo.id == 9 ? 'https://archives.bulbagarden.net/media/upload/thumb/9/9a/Pok%C3%A9mon_Ultra_Sun_and_Ultra_Moon_boxart.png/250px-Pok%C3%A9mon_Ultra_Sun_and_Ultra_Moon_boxart.png' :
                    'https://archives.bulbagarden.net/media/upload/2/24/Pokeball.png'
                }"
                     th:alt="${run.jogo.nome}"
                     onerror="this.src='https://archives.bulbagarden.net/media/upload/2/24/Pokeball.png'">
                <div class="cover-overlay"></div>
                <span class="game-badge" th:text="${run.jogo.nome}">Nome do Jogo</span>
            </div>

            <!-- Corpo -->
            <div class="run-body">
                <div class="run-name" th:text="${run.nomeDaRun}">Nome da Run</div>
                <div class="run-players">
                    <span>👥 </span>
                    <th:block th:text="${run.jogador1}">Jogador 1</th:block>
                    <span> &amp; </span>
                    <th:block th:text="${run.jogador2}">Jogador 2</th:block>
                </div>
            </div>

            <!-- Footer -->
            <div class="run-footer">
                <a th:href="@{/runs/{id}(id=${run.id})}" class="btn-detalhes">Ver Detalhes</a>
                <div class="d-flex gap-1">
                    <a th:href="@{/runs/{id}/editar(id=${run.id})}" class="btn-editar">Editar</a>
                    <form th:action="@{/runs/{id}/deletar(id=${run.id})}" method="post" class="d-inline">
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn-deletar"
                                onclick="return confirm('Tem certeza que deseja deletar esta run e todos os seus pares?');">
                            Deletar
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${runs.isEmpty()}" class="empty-state">
        <span class="empty-icon">🎮</span>
        <h3>Nenhuma run cadastrada ainda</h3>
        <p>Que tal criar a primeira aventura clicando no botão acima?</p>
    </div>

</main>
</body>
</html>
