<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Gerenciador Nuzlocke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Nunito', sans-serif;
        }
        .pokedex-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .pokedex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .pokedex-title {
            font-family: 'Press Start 2P', monospace;
            color: #f0c040;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0 #b8860b;
        }
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            color: #fff;
            width: 100%;
            max-width: 400px;
        }
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .pokemon-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        .pokemon-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: #f0c040;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .pokemon-img {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
        }
        .pokemon-id {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            font-weight: 800;
        }
        .pokemon-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .type-badge {
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: 800;
        }
        .btn-back {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: #f0c040;
        }
    </style>
</head>
<body>

<div class="pokedex-container">
    <div class="pokedex-header">
        <div>
            <a th:href="@{/dashboard}" class="btn-back mb-3 d-inline-block">← Voltar ao Dashboard</a>
            <h1 class="pokedex-title">Pokédex</h1>
        </div>
        <form th:action="@{/pokedex}" method="get" class="d-flex gap-2">
            <input type="text" name="search" th:value="${search}" class="search-box" placeholder="Nome ou número...">
            <button type="submit" class="btn btn-warning fw-bold">Buscar</button>
        </form>
    </div>

    <div class="pokemon-grid">
        <a th:each="pkm : ${pokemons}" th:href="@{/pokedex/{id}(id=${pkm.id})}" class="pokemon-card">
            <div class="pokemon-id" th:text="'#' + ${#numbers.formatInteger(pkm.pkdexNumber, 3)}">#001</div>
            <img th:src="${pkm.sprite}" class="pokemon-img" alt="sprite">
            <div class="pokemon-name" th:text="${pkm.name}">Bulbasaur</div>
            <div class="d-flex justify-content-center gap-1">
                <span class="type-badge" th:classappend="'type-' + ${#strings.toLowerCase(pkm.primaryType)}" th:text="${pkm.primaryType}"></span>
                <span th:if="${pkm.secundaryType}" class="type-badge" th:classappend="'type-' + ${#strings.toLowerCase(pkm.secundaryType)}" th:text="${pkm.secundaryType}"></span>
            </div>
        </a>
    </div>

    <div th:if="${pokemons.isEmpty()}" class="text-center py-5">
        <h3>Nenhum Pokémon encontrado.</h3>
        <p>Tente buscar por outro nome ou número.</p>
        <a th:href="@{/pokedex}" class="btn btn-outline-warning">Ver Todos</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
