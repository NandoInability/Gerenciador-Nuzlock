<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pokemon.name} + ' - Pokédex'">Detalhes Pokémon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: #fff; font-family: 'Nunito', sans-serif; }
        .details-container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 2.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .pkm-header { text-align: center; margin-bottom: 2rem; }
        .pkm-title { font-family: 'Press Start 2P', monospace; color: #f0c040; margin-top: 1rem; }
        .pkm-image-big { width: 200px; height: 200px; filter: drop-shadow(0 0 20px rgba(240,192,64,0.2)); }
        .info-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 1.5rem; height: 100%; }
        .stat-row { margin-bottom: 0.8rem; }
        .stat-label { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; }
        .stat-bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .btn-back { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.6rem 1.2rem; text-decoration: none; font-weight: 700; display: inline-block; margin-bottom: 2rem; }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: #f0c040; }
        .type-badge-lg { font-size: 0.9rem; padding: 0.5rem 1.2rem; border-radius: 10px; text-transform: uppercase; font-weight: 800; }
        .evol-chain-title { font-family: 'Press Start 2P', monospace; font-size: 0.8rem; color: #f0c040; margin-bottom: 1.5rem; text-align: center; }
    </style>
</head>
<body>

<div class="container py-5">
    <a th:href="@{/pokedex}" class="btn-back">← Voltar para a Lista</a>

    <div class="details-container">
        <div class="row align-items-center">
            <div class="col-md-5 pkm-header">
                <div class="pokemon-id fs-4" th:text="'#' + ${#numbers.formatInteger(pokemon.pkdexNumber, 3)}">#001</div>
                <img th:src="${pokemon.sprite}" class="pkm-image-big" alt="sprite">
                <h1 class="pkm-title" th:text="${pokemon.name}">Bulbasaur</h1>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <span class="type-badge-lg" th:classappend="'type-' + ${#strings.toLowerCase(pokemon.primaryType)}" th:text="${pokemon.primaryType}"></span>
                    <span th:if="${pokemon.secundaryType}" class="type-badge-lg" th:classappend="'type-' + ${#strings.toLowerCase(pokemon.secundaryType)}" th:text="${pokemon.secundaryType}"></span>
                </div>
            </div>

            <div class="col-md-7">
                <div class="info-card">
                    <h4 class="mb-4 fw-800">Informações Base</h4>
                    <div class="stat-row">
                        <div class="stat-label">Geração <span th:text="${pokemon.generation}">1</span></div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Cadeia Evolutiva <span th:text="${pokemon.evolChain}">Bulbasaur</span></div>
                    </div>
                    <hr class="my-4 opacity-25">
                    <!-- Base Stats -->
                    <h4 class="mb-4 fw-800">Base Stats</h4>

                    <div class="stat-row">
                        <div class="stat-label">HP <span th:text="${pokemon.hp != null ? pokemon.hp : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill bg-success" th:style="'width: ' + (${pokemon.hp != null ? (pokemon.hp * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Ataque <span th:text="${pokemon.attack != null ? pokemon.attack : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill bg-danger" th:style="'width: ' + (${pokemon.attack != null ? (pokemon.attack * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Defesa <span th:text="${pokemon.defense != null ? pokemon.defense : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill bg-warning" th:style="'width: ' + (${pokemon.defense != null ? (pokemon.defense * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Sp. Attack <span th:text="${pokemon.spAttack != null ? pokemon.spAttack : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill bg-info" th:style="'width: ' + (${pokemon.spAttack != null ? (pokemon.spAttack * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Sp. Defense <span th:text="${pokemon.spDefense != null ? pokemon.spDefense : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill" style="background-color: #6f42c1; width: 0%;" th:styleappend="'width: ' + (${pokemon.spDefense != null ? (pokemon.spDefense * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-label">Velocidade <span th:text="${pokemon.speed != null ? pokemon.speed : '-'}">-</span></div>
                        <div class="stat-bar-bg">
                            <div class="stat-bar-fill bg-secondary" th:style="'width: ' + (${pokemon.speed != null ? (pokemon.speed * 100.0 / 255.0) : 0}) + '%'"></div>
                        </div>
                    </div>

                    <hr class="my-4 opacity-25">

                    <h4 class="mb-4 fw-800">Método de Evolução</h4>
                    <p th:text="${pokemon.evoDetails != null ? pokemon.evoDetails : 'Nenhum detalhe de evolução registrado.'}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
