<!-- @formatter:off -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Par</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a2e;
            background-image: radial-gradient(ellipse at 20% 20%, #16213e 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, #0f3460 0%, transparent 60%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            margin: 0;
        }
        .page-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border-bottom: 3px solid #ffd60a;
            padding: 1.25rem 1rem;
            text-align: center;
            position: sticky; top: 0; z-index: 10;
        }
        .page-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.55rem, 3vw, 0.85rem);
            color: #f0c040;
            text-shadow: 2px 2px 0 #b8860b, 3px 3px 0 #8b6914;
            margin: 0; line-height: 1.7;
        }
        .form-wrap { max-width: 560px; margin: 0 auto; padding: 1.25rem 0.9rem 5rem; }
        .form-label {
            color: rgba(255,255,255,0.65);
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 0.35rem; display: block;
        }
        .form-control {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 10px;
            width: 100%; padding: 0.65rem 0.85rem;
            font-family: 'Nunito', sans-serif; font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none; border-color: #f0c040;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(240,192,64,0.15);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .player-fieldset {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 14px; padding: 1rem !important; margin-bottom: 1rem;
        }
        .player-fieldset legend {
            color: #f0c040; font-weight: 800; font-size: 0.8rem;
            letter-spacing: 1px; text-transform: uppercase;
            background: #1a1a2e; padding: 2px 10px; border-radius: 20px;
        }

        /* ── PICKER ── */
        .pkm-picker-wrapper { position: relative; margin-bottom: 0.75rem; }
        .pkm-search-wrap { position: relative; }
        .pkm-search-icon {
            position: absolute; left: 11px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35); pointer-events: none; font-size: 0.95rem;
        }
        .pkm-search-input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px 10px 0 0; color: #fff;
            padding: 0.65rem 0.85rem 0.65rem 2.4rem;
            width: 100%; font-family: 'Nunito', sans-serif; font-size: 1rem;
            outline: none; transition: border-color 0.2s;
        }
        .pkm-search-input:focus { border-color: #f0c040; }
        .pkm-search-input::placeholder { color: rgba(255,255,255,0.25); }
        .pkm-selected-display {
            display: flex; align-items: center; gap: 10px;
            background: rgba(240,192,64,0.1);
            border: 1px solid rgba(240,192,64,0.35);
            border-top: none; border-radius: 0 0 10px 10px;
            padding: 0.5rem 0.85rem; min-height: 50px; cursor: pointer;
        }
        .pkm-selected-display img { width: 38px; height: 38px; image-rendering: pixelated; flex-shrink: 0; }
        .pkm-selected-display .selected-name { color: #f0c040; font-weight: 700; font-size: 1rem; }
        .pkm-selected-display .placeholder-text { color: rgba(255,255,255,0.25); font-size: 0.9rem; }
        .pkm-selected-display .clear-btn {
            margin-left: auto;
            background: rgba(230,57,70,0.3); border: none; color: #e63946;
            border-radius: 50%; width: 26px; height: 26px; font-size: 0.75rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .pkm-dropdown {
            display: none; position: absolute; left: 0; right: 0; z-index: 1000;
            background: #16213e; border: 1px solid rgba(255,255,255,0.15);
            border-top: none; border-radius: 0 0 14px 14px;
            max-height: 260px; overflow-y: auto; padding: 8px;
            scrollbar-width: thin; scrollbar-color: #f0c040 transparent;
        }
        .pkm-dropdown.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 5px; }
        .pkm-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 5px 3px; border-radius: 9px; cursor: pointer;
            border: 2px solid transparent; background: rgba(255,255,255,0.04);
            transition: all 0.12s; text-align: center;
            min-height: 70px; justify-content: center;
        }
        .pkm-card:hover, .pkm-card:active { background: rgba(240,192,64,0.15); border-color: rgba(240,192,64,0.5); }
        .pkm-card.selected { background: rgba(240,192,64,0.2); border-color: #f0c040; }
        .pkm-card.hidden { display: none; }
        .pkm-card.disabled { opacity: 0.2; pointer-events: none; }
        .pkm-card img { width: 44px; height: 44px; image-rendering: pixelated; }
        .pkm-card span {
            font-size: 0.58rem; color: rgba(255,255,255,0.65);
            margin-top: 3px; line-height: 1.2;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60px;
        }
        .pkm-card.selected span { color: #f0c040; }
        .pkm-real-select { display: none !important; }
        .no-results {
            display: none; color: rgba(255,255,255,0.35);
            font-size: 0.85rem; text-align: center; padding: 20px; grid-column: 1 / -1;
        }

        /* ── BOTÕES FIXOS ── */
        .form-actions {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.96); backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 0.85rem 1rem; display: flex; gap: 0.6rem; z-index: 20;
        }
        .btn-cancelar {
            flex: 1; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
            border-radius: 12px; padding: 0.7rem; font-weight: 700;
            font-family: 'Nunito', sans-serif; font-size: 0.95rem;
            text-align: center; text-decoration: none; transition: background 0.15s;
        }
        .btn-cancelar:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .btn-salvar {
            flex: 2; background: linear-gradient(135deg, #e63946, #c1121f);
            border: none; color: #fff; font-weight: 800;
            border-radius: 12px; padding: 0.7rem;
            font-family: 'Nunito', sans-serif; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4); cursor: pointer;
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1 class="page-title" th:text="${par.id == null} ? 'Novo Par' : 'Editar Par'"></h1>
</div>

<div class="form-wrap">
    <form th:action="${par.id == null} ? @{/runs/{runId}/pares(runId=${runId})} : @{/runs/{runId}/pares/{parId}/editar(runId=${runId}, parId=${par.id})}"
          th:object="${par}" method="post" id="main-form">

        <div th:if="${errorMessage}" class="alert alert-danger rounded-3 mb-3" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">📍 Local de Captura</label>
            <input type="text" class="form-control" th:field="*{localCaptura}"
                   placeholder="Ex: Rota 1" required>
        </div>

        <!-- JOGADOR 1 -->
        <fieldset class="player-fieldset border">
            <legend class="float-none w-auto px-2">🎮 Jogador 1</legend>
            <div class="mb-2">
                <label class="form-label">Espécie de Pokémon</label>
                <select class="pkm-real-select starter-option" id="pkm1-select" th:field="*{pkm1.especie}" required>
                    <option value="">Selecione</option>
                    <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"
                            th:attr="data-sprite=${p.sprite}, data-chain=${p.evolChain}"></option>
                </select>
                <div class="pkm-picker-wrapper" data-target="pkm1-select">
                    <div class="pkm-search-wrap">
                        <span class="pkm-search-icon">🔍</span>
                        <input type="text" class="pkm-search-input" placeholder="Buscar Pokémon..." autocomplete="off">
                    </div>
                    <div class="pkm-selected-display"><span class="placeholder-text">Nenhum selecionado</span></div>
                    <div class="pkm-dropdown"><span class="no-results">Nenhum Pokémon encontrado</span></div>
                </div>
            </div>
            <div>
                <label class="form-label">Apelido</label>
                <input type="text" class="form-control" th:field="*{pkm1.apelido}" placeholder="Apelido do Pokémon">
            </div>
        </fieldset>

        <!-- JOGADOR 2 -->
        <fieldset class="player-fieldset border">
            <legend class="float-none w-auto px-2">🎮 Jogador 2</legend>
            <div class="mb-2">
                <label class="form-label">Espécie de Pokémon</label>
                <select class="pkm-real-select starter-option" id="pkm2-select" th:field="*{pkm2.especie}" required>
                    <option value="">Selecione</option>
                    <option th:each="p : ${pokemons}" th:value="${p.id}" th:text="${p.name}"
                            th:attr="data-sprite=${p.sprite}, data-chain=${p.evolChain}"></option>
                </select>
                <div class="pkm-picker-wrapper" data-target="pkm2-select">
                    <div class="pkm-search-wrap">
                        <span class="pkm-search-icon">🔍</span>
                        <input type="text" class="pkm-search-input" placeholder="Buscar Pokémon..." autocomplete="off">
                    </div>
                    <div class="pkm-selected-display"><span class="placeholder-text">Nenhum selecionado</span></div>
                    <div class="pkm-dropdown"><span class="no-results">Nenhum Pokémon encontrado</span></div>
                </div>
            </div>
            <div>
                <label class="form-label">Apelido</label>
                <input type="text" class="form-control" th:field="*{pkm2.apelido}" placeholder="Apelido do Pokémon">
            </div>
        </fieldset>

    </form>
</div>

<div class="form-actions">
    <a th:href="@{/runs/{id}(id=${runId})}" class="btn-cancelar">Cancelar</a>
    <button type="submit" form="main-form" class="btn-salvar">Salvar Par ✓</button>
</div>

<script th:inline="javascript">
    const availablePokemon = /*[[${pokemons}]]*/ [];

    document.querySelectorAll('.pkm-picker-wrapper').forEach(wrapper => {
        const targetId      = wrapper.dataset.target;
        const realSelect    = document.getElementById(targetId);
        const searchInput   = wrapper.querySelector('.pkm-search-input');
        const dropdown      = wrapper.querySelector('.pkm-dropdown');
        const selectedDisplay = wrapper.querySelector('.pkm-selected-display');
        const noResults     = wrapper.querySelector('.no-results');

        [...realSelect.options].filter(o => o.value).forEach(opt => {
            const card = document.createElement('div');
            card.className = 'pkm-card';
            card.dataset.id    = opt.value;
            card.dataset.name  = opt.text.toLowerCase();
            card.dataset.chain = opt.dataset.chain || '';
            const sprite = opt.dataset.sprite || '';
            card.innerHTML = `<img src="${sprite}" alt="${opt.text}"
                onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
                <span>${opt.text}</span>`;
            card.addEventListener('click', () => selectPokemon(wrapper, realSelect, card, opt.value, opt.text, sprite));
            dropdown.appendChild(card);
        });

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.toLowerCase().trim();
            let visible = 0;
            dropdown.querySelectorAll('.pkm-card').forEach(c => {
                const match = c.dataset.name.includes(q);
                c.classList.toggle('hidden', !match);
                if (match) visible++;
            });
            noResults.style.display = visible === 0 ? 'block' : 'none';
        });

        searchInput.addEventListener('focus', () => { dropdown.classList.add('open'); updateDisabled(); });
        document.addEventListener('click', e => { if (!wrapper.contains(e.target)) dropdown.classList.remove('open'); });
        selectedDisplay.addEventListener('click', () => {
            dropdown.classList.toggle('open');
            if (dropdown.classList.contains('open')) { searchInput.focus(); updateDisabled(); }
        });

        const currentVal = realSelect.value;
        if (currentVal) {
            const opt = realSelect.options[realSelect.selectedIndex];
            setDisplay(selectedDisplay, opt.value, opt.text, opt.dataset.sprite || '');
            dropdown.querySelectorAll('.pkm-card').forEach(c =>
                c.classList.toggle('selected', c.dataset.id === currentVal));
        }
    });

    function selectPokemon(wrapper, realSelect, card, id, name, sprite) {
        realSelect.value = id;
        realSelect.dispatchEvent(new Event('change'));
        setDisplay(wrapper.querySelector('.pkm-selected-display'), id, name, sprite);
        wrapper.querySelectorAll('.pkm-card').forEach(c => c.classList.toggle('selected', c === card));
        wrapper.querySelector('.pkm-dropdown').classList.remove('open');
        wrapper.querySelector('.pkm-search-input').value = '';
        wrapper.querySelectorAll('.pkm-card').forEach(c => c.classList.remove('hidden'));
        updateDisabled();
    }

    function setDisplay(display, id, name, sprite) {
        display.innerHTML = `
            <img src="${sprite}" alt="${name}"
                 onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
            <span class="selected-name">${name}</span>
            <button type="button" class="clear-btn" title="Limpar">✕</button>`;
        display.querySelector('.clear-btn').addEventListener('click', e => { e.stopPropagation(); clearPicker(display); });
    }

    function clearPicker(display) {
        const wrapper    = display.closest('.pkm-picker-wrapper');
        const realSelect = document.getElementById(wrapper.dataset.target);
        realSelect.value = '';
        realSelect.dispatchEvent(new Event('change'));
        display.innerHTML = '<span class="placeholder-text">Nenhum selecionado</span>';
        wrapper.querySelectorAll('.pkm-card').forEach(c => c.classList.remove('selected'));
        updateDisabled();
    }

    function updateDisabled() {
        const selectedChains = new Set();
        document.querySelectorAll('.pkm-real-select').forEach(sel => {
            if (sel.value) {
                const chain = sel.options[sel.selectedIndex].dataset.chain;
                if (chain) selectedChains.add(chain);
            }
        });
        document.querySelectorAll('.pkm-picker-wrapper').forEach(wrapper => {
            const realSelect = document.getElementById(wrapper.dataset.target);
            const currentVal = realSelect.value;
            wrapper.querySelectorAll('.pkm-card').forEach(card => {
                const chain = card.dataset.chain;
                const isMine = card.dataset.id === currentVal;
                card.classList.toggle('disabled', !!(chain && selectedChains.has(chain) && !isMine));
            });
        });
    }
</script>
</body>
</html>
